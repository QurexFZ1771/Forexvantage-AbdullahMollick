<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForexVantage - Advanced Risk Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* ১. কালার এবং ডিজাইন থিম (CSS) */
        :root {
            --bg: #0b0f19;
            --card: #161b26;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #2d3748;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Urbanist', sans-serif; 
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* ২. প্রিমিয়াম হেডার এবং লোগো */
        header {
            background: rgba(22, 27, 38, 0.9);
            backdrop-filter: blur(15px);
            padding: 10px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-box { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-text { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: 1px; }
        .logo-text span { color: var(--gold); }

        .hire-btn {
            background: var(--gold); color: #000; padding: 10px 20px;
            border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 14px;
        }

        /* ৩. মেইন লেআউট গ্রিড */
        .terminal-grid {
            display: grid;
            grid-template-columns: 320px 1fr 300px; /* ল্যাপটপে ৩ কলাম */
            gap: 20px; padding: 20px;
            max-width: 1600px; margin: 0 auto;
        }

        .card { 
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; 
        }

        h2 { font-size: 14px; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* ৪. ক্যালকুলেটর ডিজাইন */
        .input-group { margin-bottom: 15px; }
        label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 5px; }
        input {
            width: 100%; background: #0b0f19; border: 1px solid var(--border);
            padding: 12px; border-radius: 8px; color: white;
            font-family: 'JetBrains Mono', monospace; font-size: 16px;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .res-panel {
            background: #0f172a; padding: 20px; border-radius: 12px; text-align: center;
            border: 1px solid var(--accent); margin-top: 20px;
        }
        .lot-val { font-family: 'JetBrains Mono', monospace; font-size: 32px; color: var(--accent); display: block; }

        /* ৫. চার্ট এবং সাইড উইজেট */
        #chart-container { height: 600px; border-radius: 12px; overflow: hidden; }
        .side-scroll { height: 600px; overflow-y: auto; scrollbar-width: none; }
        .side-scroll::-webkit-scrollbar { display: none; }

        /* ৬. মোবাইল ফ্রেন্ডলি সেটিংস */
        @media (max-width: 1100px) {
            .terminal-grid { grid-template-columns: 1fr; }
            #chart-container { height: 400px; }
        }

        footer { text-align: center; padding: 30px; color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo-box">
        <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 40Q50 20 90 40Q80 80 50 95Q20 80 10 40" stroke="#fbbf24" stroke-width="3"/>
            <path d="M30 45L50 75L70 35" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
            <path d="M25 65L45 55L55 60L75 40" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <div class="logo-text">FOREX<span>VANTAGE</span></div>
    </a>
    <a href="https://www.fiverr.com/your-profile" target="_blank" class="hire-btn">HIRE ME ON FIVERR</a>
</header>

<div class="terminal-grid">
    <div class="card">
        <h2><i class="fa-solid fa-calculator"></i> Risk Intelligence</h2>
        <div class="input-group">
            <label>Balance (USD)</label>
            <input type="number" id="balance" value="10000" oninput="doMath()">
        </div>
        <div class="input-group">
            <label>Risk (%)</label>
            <input type="number" id="risk" value="1" step="0.1" oninput="doMath()">
        </div>
        <div class="input-group">
            <label>Stop Loss (Pips)</label>
            <input type="number" id="sl" value="20" oninput="doMath()">
        </div>
        <div class="res-panel">
            <span style="font-size: 11px; color: var(--text-muted);">RECOMMENDED LOT SIZE</span>
            <span class="lot-val" id="lotRes">0.50</span>
            <span style="font-size: 12px; color: #22c55e;">Risk Amount: $<span id="riskAmt">100</span></span>
        </div>
    </div>

    <div class="card">
        <h2><i class="fa-solid fa-chart-line"></i> Market Terminal</h2>
        <div id="chart-container"></div>
    </div>

    <div class="card side-scroll">
        <h2><i class="fa-solid fa-gauge-high"></i> Analysis</h2>
        <div class="tradingview-widget-container" style="height: 350px;">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
            {
                "interval": "1h", "width": "100%", "height": "100%", "symbol": "FX:EURUSD", "showIntervalTabs": true, "displayMode": "single", "locale": "en", "colorTheme": "dark"
            }
            </script>
        </div>
        <h2 style="margin-top: 20px;"><i class="fa-solid fa-calendar"></i> News Events</h2>
        <div class="tradingview-widget-container" style="height: 300px;">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
            {
                "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "locale": "en", "importanceFilter": "-1,0,1"
            }
            </script>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 FOREXVANTAGE | PORTFOLIO PROJECT BY ABDULLAH</p>
</footer>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // চার্ট লোড করা হচ্ছে
    new TradingView.widget({
        "autosize": true,
        "symbol": "FX:EURUSD",
        "interval": "H1",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "enable_publishing": false,
        "backgroundColor": "rgba(22, 27, 38, 1)",
        "container_id": "chart-container"
    });

    // ক্যালকুলেটর লজিক
    function doMath() {
        const balance = parseFloat(document.getElementById('balance').value) || 0;
        const riskP = parseFloat(document.getElementById('risk').value) || 0;
        const sl = parseFloat(document.getElementById('sl').value) || 0;

        const riskDollar = balance * (riskP / 100);
        const lot = sl > 0 ? (riskDollar / (sl * 10)) : 0;

        document.getElementById('lotRes').innerText = lot.toFixed(2);
        document.getElementById('riskAmt').innerText = riskDollar.toFixed(2);
    }
</script>

</body>
</html>
